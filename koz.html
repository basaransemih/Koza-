<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koza Arama Motoru</title>
    <style>
        :root {
            --bg-color: #f8f9fa; --text-color: #202124; --primary-color: #1a73e8;
            --panel-bg: #ffffff; --border-color: #dfe1e5; --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-color: #202124; --text-color: #e8eaed; --primary-color: #8ab4f8;
            --panel-bg: #303134; --border-color: #5f6368;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; transition: 0.3s; }
        
        .main-wrapper { max-width: 800px; margin: 0 auto; text-align: center; }
        .search-bar { width: 100%; padding: 15px; border-radius: 25px; border: 1px solid var(--border-color); background: var(--panel-bg); color: var(--text-color); font-size: 1rem; margin: 20px 0; }
        
        .engine-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .engine-btn { padding: 10px 15px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--panel-bg); color: var(--text-color); cursor: pointer; }
        
        #results { text-align: left; margin-top: 30px; }
        .result-item { background: var(--panel-bg); padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
        .result-item a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
        .result-item p { font-size: 0.9rem; color: #70757a; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1>Koza</h1>
    <input type="text" id="searchInput" class="search-bar" placeholder="Ne aramak istersin?">
    
    <div class="engine-btns">
        <button class="engine-btn" onclick="performSearch('searx')">SearxNG İle Ara</button>
        <button class="engine-btn" onclick="performSearch('ddg')">DuckDuckGo İle Ara</button>
    </div>

    <div id="results"></div>
</div>

<script>
    async function performSearch(type) {
        const query = document.getElementById('searchInput').value;
        const resultsDiv = document.getElementById('results');
        if (!query) return;

        resultsDiv.innerHTML = "Aranıyor...";

        try {
            let data = [];
            if (type === 'searx') {
                // SearxNG'den veri çek
                const response = await fetch(`https://searx.be/search?q=${encodeURIComponent(query)}&format=json`);
                const json = await response.json();
                data = json.results.slice(0, 10).map(r => ({ title: r.title, url: r.url, desc: r.content || '' }));
            } else {
                // DDG'den veri çek (DuckDuckGo, doğrudan sonuç listesi vermediği için özet çekiyoruz)
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json`);
                const json = await response.json();
                data = [{ title: json.Heading || query, url: json.AbstractURL, desc: json.AbstractText }];
            }

            // Sonuçları ekrana bas
            resultsDiv.innerHTML = data.map(item => `
                <div class="result-item">
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p>${item.desc}</p>
                </div>
            `).join('');

        } catch (e) {
            resultsDiv.innerHTML = "Bir hata oluştu. Lütfen tekrar deneyin.";
        }
    }
</script>

</body>

</html>
