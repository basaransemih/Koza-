<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Koza Arama</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .box { width: 90%; max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .input-bar { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 20px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; background: #1a73e8; color: white; cursor: pointer; margin: 5px; }
        #results { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="box">
    <h1>Koza</h1>
    <input type="text" id="searchInput" class="input-bar" placeholder="Ne aramak istersin?">
    <div>
        <button class="btn" onclick="directSearch('google')">Google'a Git</button>
        <button class="btn" onclick="directSearch('ddg')">DDG'ye Git</button>
        <button class="btn" onclick="fetchResults()">JSON Veri Getir (Searx)</button>
    </div>
    <div id="results"></div>
</div>

<script>
    // 1. Yönlendirme (En güvenli yöntem)
    function directSearch(engine) {
        const query = document.getElementById('searchInput').value;
        const urls = {
            google: "https://www.google.com/search?q=",
            ddg: "https://duckduckgo.com/?q="
        };
        if(query) window.open(urls[engine] + encodeURIComponent(query), '_blank');
    }

    // 2. API ile veri çekme (CORS Bypass yöntemi: corsproxy.io kullanımı)
    async function fetchResults() {
        const query = document.getElementById('searchInput').value;
        const display = document.getElementById('results');
        if (!query) return;

        display.innerHTML = "Yükleniyor...";
        
        // CORS engellerini aşmak için 'corsproxy.io' ekledik
        const apiUrl = `https://corsproxy.io/?https://searx.be/search?q=${encodeURIComponent(query)}&format=json`;

        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            display.innerHTML = data.results.slice(0, 5).map(item => `
                <div style="margin-bottom:10px; border-bottom:1px solid #eee;">
                    <a href="${item.url}" target="_blank" style="font-weight:bold;">${item.title}</a>
                    <p style="font-size:0.8em;">${item.content || 'Açıklama yok'}</p>
                </div>
            `).join('');
        } catch (e) {
            display.innerHTML = "Hata: API isteği engellendi. Lütfen 'X'e Git' butonlarını kullan.";
        }
    }
</script>
</body>
</html>
