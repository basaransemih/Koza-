<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çok Yakında</title>
    <style>
        body {
            /* Çok daha koyu, derin kahve/kömür tonları */
            background-color: #1a1614;
            color: #d7ccc8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #2d2724;
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid #4e342e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #yazi {
            font-size: 1.5rem;
            min-width: 220px;
            color: #d7ccc8;
            border-right: 2px solid #8d6e63;
            padding-right: 10px;
            animation: blink 0.7s step-end infinite;
        }

        .ara-btn {
            background: #8d6e63;
            color: #1a1614;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 15px;
            transition: all 0.3s;
        }

        /* "Ara" butonunun basılma animasyonu */
        .click-animation {
            animation: press 2s infinite;
        }

        @keyframes press {
            0%, 100% { transform: scale(1); background: #8d6e63; }
            50% { transform: scale(0.95); background: #a1887f; }
        }

        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>

    <div class="search-container">
        <div id="yazi"></div>
        <button class="ara-btn click-animation">ARA</button>
    </div>

    <script>
        const metin = "ÇOK YAKINDA";
        const element = document.getElementById("yazi");
        let index = 0;
        let siliniyor = false;

        function yaz() {
            element.innerHTML = metin.substring(0, index);

            if (!siliniyor) {
                index++;
                if (index > metin.length) {
                    siliniyor = true;
                    setTimeout(yaz, 2000);
                    return;
                }
            } else {
                index--;
                if (index === 0) {
                    siliniyor = false;
                }
            }
            setTimeout(yaz, siliniyor ? 50 : 150);
        }
        yaz();
    </script>
</body>
</html>
