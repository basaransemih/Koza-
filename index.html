<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çok Yakında</title>
    <style>
        body {
            background-color: #000;
            color: #00FF41; /* Coder yeşili */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 4rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00FF41;
        }

        #yazi {
            border-right: 4px solid #00FF41;
            padding-right: 10px;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="yazi"></div>

    <script>
        const metin = "ÇOK YAKINDA";
        const element = document.getElementById("yazi");
        let index = 0;
        let siliniyor = false;

        function yaz() {
            element.innerHTML = metin.substring(0, index);

            if (!siliniyor) {
                index++;
                if (index > metin.length) {
                    siliniyor = true;
                    setTimeout(yaz, 2000); // Yazdıktan sonra bekleme süresi
                    return;
                }
            } else {
                index--;
                if (index === 0) {
                    siliniyor = false;
                }
            }
            
            setTimeout(yaz, siliniyor ? 100 : 200); // Silme hızı / Yazma hızı
        }

        yaz();
    </script>
</body>
</html>
