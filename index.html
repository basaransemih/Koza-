<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Yakında</title>
    <style>
        body {
            background-color: #1a1614;
            color: #d7ccc8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #2d2724;
            padding: 20px 40px;
            border-radius: 100px;
            border: 2px solid #4e342e;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 700px; /* Büyük ekranlar için maksimum genişlik */
            transition: all 0.3s ease;
        }

        #yazi {
            font-size: 2rem; /* Daha büyük yazı */
            flex-grow: 1;
            color: #d7ccc8;
            border-right: 3px solid #8d6e63;
            padding-right: 15px;
            animation: blink 0.7s step-end infinite;
            white-space: nowrap;
        }

        .ara-btn {
            background: #8d6e63;
            color: #1a1614;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin-left: 20px;
            transition: all 0.3s;
        }

        .click-animation {
            animation: press 2s infinite;
        }

        @keyframes press {
            0%, 100% { transform: scale(1); background: #8d6e63; }
            50% { transform: scale(0.95); background: #a1887f; }
        }

        @keyframes blink { 50% { border-color: transparent; } }

        /* Mobil cihazlar için responsive düzenleme */
        @media (max-width: 600px) {
            .search-container {
                padding: 15px 20px;
            }
            #yazi {
                font-size: 1.2rem;
            }
            .ara-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div id="yazi"></div>
        <button class="ara-btn click-animation">ARA</button>
    </div>

    <script>
        const metin = "ÇOK YAKINDA";
        const element = document.getElementById("yazi");
        let index = 0;
        let siliniyor = false;

        function yaz() {
            element.innerHTML = metin.substring(0, index);

            if (!siliniyor) {
                index++;
                if (index > metin.length) {
                    siliniyor = true;
                    setTimeout(yaz, 2000);
                    return;
                }
            } else {
                index--;
                if (index === 0) {
                    siliniyor = false;
                }
            }
            setTimeout(yaz, siliniyor ? 50 : 150);
        }
        yaz();
    </script>
</bod
    y>
</html>
