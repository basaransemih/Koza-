<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çok Yakında</title>
    <style>
        body {
            background-color: #000;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Arama Çubuğu Stili */
        .search-container {
            width: 400px;
            background: #111;
            border: 1px solid #00FF41;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        #yazi {
            font-size: 2rem;
            border-right: 3px solid #00FF41;
            padding-right: 5px;
            animation: blink 0.7s step-end infinite;
        }

        /* En alt imza */
        .footer-sig {
            position: absolute;
            bottom: 20px;
            font-size: 1.2rem;
            overflow: hidden;
            width: 100%;
            text-align: center;
            white-space: nowrap;
        }

        .marquee {
            display: inline-block;
            animation: slide 10s linear infinite;
        }

        @keyframes blink { 50% { border-color: transparent; } }
        
        @keyframes slide {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div id="yazi"></div>
    </div>

    <div class="footer-sig">
        <div class="marquee">başaransemih - başaransemih - başaransemih - başaransemih</div>
    </div>

    <script>
        const metin = "ÇOK YAKINDA";
        const element = document.getElementById("yazi");
        let index = 0;
        let siliniyor = false;

        function yaz() {
            element.innerHTML = metin.substring(0, index);

            if (!siliniyor) {
                index++;
                if (index > metin.length) {
                    siliniyor = true;
                    setTimeout(yaz, 2000);
                    return;
                }
            } else {
                index--;
                if (index === 0) {
                    siliniyor = false;
                }
            }
            setTimeout(yaz, siliniyor ? 100 : 200);
        }
        yaz();
    </script>
</body>
</html>
