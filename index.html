<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>basaransemih</title>
    <style>
        body {
            /* Frappe renk paleti: krem/kahve tonları */
            background-color: #e5d3b3;
            color: #5d4037;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 5px 20px;
            border-radius: 50px; /* Tam yuvarlak kenarlar */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid #8d6e63;
        }

        #yazi {
            font-size: 1.5rem;
            min-width: 200px;
            border-right: 2px solid #5d4037;
            padding-right: 10px;
            animation: blink 0.7s step-end infinite;
        }

        .ara-btn {
            background: #5d4037;
            color: #e5d3b3;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        /* Tıklanma animasyonu */
        .click-animation {
            animation: press 2s infinite;
        }

        @keyframes press {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.9); background: #3e2723; }
        }

        @keyframes blink { 50% { border-color: transparent; } }

        .footer-sig {
            position: absolute;
            bottom: 30px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            /* Yavaşça renk değiştirme animasyonu */
            animation: colorChange 3s infinite alternate;
        }

        @keyframes colorChange {
            from { color: #5d4037; opacity: 0.5; }
            to { color: #8d6e63; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="search-container">
        <div id="yazi"></div>
        <button class="ara-btn click-animation">ARA</button>
    </div>

    <div class="footer-sig">BASARANSEMIH</div>

    <script>
        const metin = "ÇOK YAKINDA";
        const element = document.getElementById("yazi");
        let index = 0;
        let siliniyor = false;

        function yaz() {
            element.innerHTML = metin.substring(0, index);

            if (!siliniyor) {
                index++;
                if (index > metin.length) {
                    siliniyor = true;
                    setTimeout(yaz, 2000);
                    return;
                }
            } else {
                index--;
                if (index === 0) {
                    siliniyor = false;
                }
            }
            setTimeout(yaz, siliniyor ? 50 : 150);
        }
        yaz();
    </script>
</body>
</html>
